name: Auto Commit

on:
  schedule:
    - cron: "0 8 * * *"  # runs daily
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Run script
        run: python update.py

      - name: Commit changes
        run: |
          git config user.name "Sharon2185"
          git config user.email "your@email.com"
          git add .
          git commit -m "Auto update $(date)" || echo "No changes"
          git push
